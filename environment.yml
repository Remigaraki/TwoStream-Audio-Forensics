    - librosa==0.10.0
    - pydub==0.25.1
    - scipy==1.10.1
    - scikit-learn==1.2.2
    - tensorboard==2.13.0
    - wandb
    - ffmpeg-python
    - flake8
    - mypy
    - pytest
    - soundfile
